<svg viewBox="0 0 420 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .wordmark {
        font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
        font-size: 40px;
        font-weight: 300;
        fill: #1B3A2D;
        letter-spacing: -1px;
      }
    </style>
  </defs>

  <!-- Icon mark -->
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#D8F3DC"/>

  <!-- Top-left: dark forest green block -->
  <rect x="10" y="10" width="37" height="37" rx="2" fill="#1B3A2D"/>

  <!-- Bottom-left: soft green block -->
  <rect x="10" y="53" width="37" height="37" rx="2" fill="#52B788"/>

  <!-- White vertical divider -->
  <rect x="49" y="10" width="5" height="80" rx="2.5" fill="white"/>

  <!-- Top-right triangle — lighter green -->
  <polygon points="56,10 56,50 92,30" fill="#74C69D"/>

  <!-- Bottom-right triangle — deep green -->
  <polygon points="56,52 56,92 92,72" fill="#2D6A4F"/>

  <!-- Wordmark -->
  <text x="118" y="65" class="wordmark">cashmaker</text>
</svg>
