<svg xmlns="http://www.w3.org/2000/svg" width="600" height="160" viewBox="0 0 600 160">
  <defs>
    <style>
      .wordmark { font-family: Arial, sans-serif; font-size: 36px; font-weight: 700; fill: #2D6A4F; letter-spacing: -0.5px; }
      .tagline  { font-family: Arial, sans-serif; font-size: 11px; font-weight: 400; fill: #74C69D; letter-spacing: 3.5px; }
    </style>
  </defs>

  <!-- Ícone geométrico centralizado verticalmente -->
  <g transform="translate(80, 80)">
    <!-- Hexágono externo -->
    <polygon points="0,-54 47,-27 47,27 0,54 -47,27 -47,-27"
             fill="#D8F3DC" stroke="#52B788" stroke-width="1.8"/>
    <!-- Hexágono interno -->
    <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15"
             fill="#B7E4C7" stroke="#74C69D" stroke-width="1.2"/>
    <!-- Seta diagonal ascendente -->
    <line x1="-17" y1="17" x2="17" y2="-17"
          stroke="#2D6A4F" stroke-width="3" stroke-linecap="round"/>
    <!-- Ponta da seta -->
    <polyline points="5,-17 17,-17 17,-5"
              fill="none" stroke="#2D6A4F" stroke-width="3"
              stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Ponto de origem -->
    <circle cx="-17" cy="17" r="3" fill="#52B788"/>
    <!-- Fragmento superior direito -->
    <polygon points="27,-27 47,-27 47,-7" fill="#52B788" opacity="0.45"/>
    <!-- Fragmento inferior esquerdo -->
    <polygon points="-27,27 -47,27 -47,7" fill="#74C69D" opacity="0.45"/>
  </g>

  <!-- Separador vertical sutil -->
  <line x1="152" y1="36" x2="152" y2="124"
        stroke="#B7E4C7" stroke-width="1" stroke-dasharray="3,5"/>

  <!-- Wordmark -->
  <text x="172" y="88" class="wordmark">Cash Maker</text>
  <!-- Tagline -->
  <text x="174" y="116" class="tagline">ORGANIZE · CONTROLE · CRESÇA</text>
</svg>
