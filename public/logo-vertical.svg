<svg viewBox="0 0 260 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .wordmark {
        font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
        font-size: 36px;
        font-weight: 300;
        fill: #1B3A2D;
        letter-spacing: -1px;
      }
    </style>
  </defs>

  <!-- Icon mark centered at (130, 60) with 120×120 size -->
  <g transform="translate(70, 0)">
    <!-- Background -->
    <rect width="120" height="120" rx="24" fill="#D8F3DC"/>

    <!-- Top-left: dark forest green block -->
    <rect x="12" y="12" width="44" height="44" rx="2" fill="#1B3A2D"/>

    <!-- Bottom-left: soft green block -->
    <rect x="12" y="64" width="44" height="44" rx="2" fill="#52B788"/>

    <!-- White vertical divider -->
    <rect x="59" y="12" width="6" height="96" rx="3" fill="white"/>

    <!-- Top-right triangle — lighter green -->
    <polygon points="67,12 67,60 110,36" fill="#74C69D"/>

    <!-- Bottom-right triangle — deep green -->
    <polygon points="67,62 67,110 110,86" fill="#2D6A4F"/>
  </g>

  <!-- Wordmark centered -->
  <text x="130" y="168" class="wordmark" text-anchor="middle">cashmaker</text>
</svg>
