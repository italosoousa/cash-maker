version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cashmaker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cashmaker
      POSTGRES_PASSWORD: cashmaker123
      POSTGRES_DB: cashmaker_dev
    ports:
      - '5432:5432'
    volumes:
      - cashmaker_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cashmaker -d cashmaker_dev']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cashmaker_pgdata:
    driver: local